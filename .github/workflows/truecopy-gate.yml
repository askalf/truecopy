# Dogfood: this repo pins its own demo MCP manifest (demo/clean-mcp.json) in
# truecopy.lock and gates it with the published truecopy-action. If the demo
# manifest drifts — or a rule change re-classifies it — this fails until the
# change is consciously re-pinned.
name: truecopy gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: read-all

jobs:
  verify:
    name: verify pinned skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: truecopy verify
        uses: askalf/truecopy-action@5c6fcf00edb83ff4846206392722292d45fee227 # v1.0.1
