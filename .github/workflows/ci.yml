name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    # Signing tests must never reach the runner's real OS keychain (macOS
    # `security`, Linux secret-tool). keychain.test.mjs manages this per-test via
    # the fake seam and overrides it where it needs the keychain-present path.
    env:
      CANON_NO_KEYCHAIN: '1'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
