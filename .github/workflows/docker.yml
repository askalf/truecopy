# Build the truecopy-mcp image AND RUN IT. A Dockerfile that only ever gets
# built proves nothing: the failure mode that matters here is a gate that starts
# fine but serves the wrong tools (or none). So this drives a real MCP handshake
# over stdio against the built image, asserts standalone serves truecopy's own
# two tools (not a wrapped demo server's), and calls truecopy-verify to confirm
# the self-dogfood lock it ships with actually verifies clean.
#
# Nothing else in CI touches the Dockerfile, and the image is what image-hosting
# MCP directories (e.g. Glama) build from — so before this, it could rot silently.
name: docker

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Dockerfile.dockerignore'
      - 'docker/**'
      - '.github/workflows/docker.yml'
  push:
    branches: [master]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.dockerignore'
      - 'docker/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build the image
        run: docker build -t truecopy-mcp:ci .

      - name: It must not run as root
        run: |
          set -euo pipefail
          uid="$(docker run --rm --entrypoint id truecopy-mcp:ci -u)"
          echo "container uid: ${uid}"
          if [ "${uid}" = "0" ]; then
            echo "::error::image runs as root (uid 0) — a gate must drop privileges"
            exit 1
          fi

      - name: Standalone serves truecopy's own tools, and self-verify passes
        run: |
          set -euo pipefail
          out="$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"truecopy-verify","arguments":{}}}' \
            | timeout 120 docker run -i --rm truecopy-mcp:ci 2>/dev/null || true)"

          echo "--- server stdout ---"
          echo "${out}" | head -c 2000
          echo

          node -e '
            const raw = require("fs").readFileSync(0, "utf8");
            const msgs = raw.split("\n").filter(Boolean).map((l) => {
              try { return JSON.parse(l); } catch { return null; }
            }).filter(Boolean);

            const list = msgs.find((m) => m && m.id === 2 && m.result && Array.isArray(m.result.tools));
            if (!list) {
              console.error("no tools/list response — the gate did not complete an MCP handshake");
              process.exit(1);
            }
            const names = list.result.tools.map((t) => t.name).sort();
            console.log("standalone tools served:", names.join(", "));
            const expected = ["truecopy-status", "truecopy-verify"];
            if (names.length !== expected.length || !expected.every((n) => names.includes(n))) {
              console.error("expected exactly the standalone tools " + expected.join(", ") + " — got: " + names.join(", "));
              console.error("(a wrapped downstream server here means the Dockerfile regressed to gate mode)");
              process.exit(1);
            }

            const verify = msgs.find((m) => m && m.id === 3);
            if (!verify || !verify.result || verify.result.isError) {
              console.error("truecopy-verify call failed:", JSON.stringify(verify));
              process.exit(1);
            }
            const report = JSON.parse(verify.result.content[0].text);
            console.log("truecopy-verify:", JSON.stringify(report));
            if (!report.ok || report.total < 1) {
              console.error("self-dogfood lock did not verify clean — expected the shipped demo entry to pass");
              process.exit(1);
            }
          ' <<< "${out}"
