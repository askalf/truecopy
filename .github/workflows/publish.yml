name: Publish to npm

# Manual backfill publisher. The PRIMARY release path is auto-release.yml,
# which fires automatically on a package.json version bump and handles
# tag + GitHub release + npm publish. This workflow is the documented
# recovery lever (see npm-token-health.yml): after fixing a rotated
# NPM_TOKEN, run
#   gh workflow run publish.yml --ref master
# to publish whatever version is currently in package.json on master.
# It is also how the FIRST publish is done (no version bump to react to).
#
# Dispatch-only on purpose. A `release: published` trigger here would
# double-fire against auto-release.yml (which CREATES the release), and the
# second `npm publish` would fail "cannot publish over existing version".

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
