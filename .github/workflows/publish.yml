name: Publish to npm

# The ONLY workflow that can publish to npm, via OIDC trusted publishing:
# the npmjs.com trusted publisher is bound to this exact filename
# (publish.yml). No NPM_TOKEN secret is needed (or set on this repo).
#
# Two ways this fires:
#  - auto-release.yml dispatches it after cutting the tag + GitHub release
#    for a version bump on master (it cannot publish inline — npm allows one
#    trusted publisher per package, and it is bound to THIS file)
#  - manual backfill: gh workflow run publish.yml -R askalf/truecopy --ref master
#    publishes whatever version master's package.json holds (e.g. after fixing
#    a trusted-publisher misconfig that stranded a release)
#
# Idempotent: if the version is already on the registry the run is a green
# no-op, so re-dispatching is always safe.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC trusted publishing (job-scoped)
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The npm trusted publisher is bound to this filename, NOT to a branch, so a
      # dispatch on any ref could publish that ref's code with valid provenance.
      # Refuse anything but master, loudly (auto-release dispatches --ref master).
      - name: Guard — only master may publish
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/master" ]; then
            echo "::error::publish.yml only publishes from master (got $REF) — refusing to publish an arbitrary ref."
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Trusted publishing (OIDC) needs npm >=11.5.1; Node 24 bundles npm 11.
          # ci.yml still tests the supported runtime floor (20, 22).
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Skip if this version is already on the registry
        id: gate
        run: |
          set -euo pipefail
          v=$(node -p "require('./package.json').version")
          # Distinguish "not published yet" (E404 → publish) from a registry
          # outage (→ fail, don't blindly proceed). A bare `npm view || else`
          # conflated the two.
          if out=$(npm view "@askalf/truecopy@${v}" version 2>&1); then
            echo "@askalf/truecopy@${v} already published ($out); nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$out" | grep -q 'E404'; then
            echo "Not on the registry yet; will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::npm view failed (not an E404 — registry issue?): $out"
            exit 1
          fi

      - name: Install + test
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          npm ci
          npm test

      # Auth = OIDC via the npmjs.com trusted publisher bound to THIS workflow
      # filename (publish.yml) — no NPM_TOKEN. Provenance is automatic under OIDC.
      - name: npm publish
        if: steps.gate.outputs.skip != 'true'
        run: npm publish --access public
