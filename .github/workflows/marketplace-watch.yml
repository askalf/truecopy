# Standing watch: re-scan the official Claude Code plugin DIRECTORY daily —
# every catalog plugin, including the external vendor plugins fetched at their
# catalog-pinned SHAs — and publish the snapshot to the `watch` branch
# (badge.json drives the README badge; WATCH.md is the human report;
# history.jsonl accumulates one line per run). A poisoned skill turns the run
# red AND ships in the snapshot.
name: marketplace-watch

on:
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC (staggered off the :00 grid)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the snapshot to the watch branch
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # the snapshot push supplies the token explicitly in its URL

      - name: Install canon
        run: npm ci --no-fund --no-audit # frozen lockfile — a fresh-resolved transitive can't run install scripts in this write-token job

      - name: Clone the plugin directory at today's tip
        run: git clone --depth 1 https://github.com/anthropics/claude-plugins-official.git "$RUNNER_TEMP/directory"

      - name: Fetch every catalog plugin at its pinned sha
        run: |
          set -o pipefail # the tee must not mask the script's exit code
          node support/marketplace-fetch.mjs "$RUNNER_TEMP/directory" "$RUNNER_TEMP/corpus" | tee "$RUNNER_TEMP/fetch-summary.json"
          {
            echo '### marketplace fetch'
            echo ''
            echo '```json'
            cat "$RUNNER_TEMP/fetch-summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan every directory skill
        id: scan
        run: |
          set -o pipefail # without it `|| status=$?` reads tee's exit 0, and a poisoned scan stays green
          status=0
          node support/marketplace-watch.mjs "$RUNNER_TEMP/corpus" "$RUNNER_TEMP/out" | tee "$RUNNER_TEMP/summary.json" || status=$?
          if [ "$status" -ge 2 ]; then exit "$status"; fi # 2 = the watch itself broke; 1 (poisoned) still publishes below
          echo "status=$status" >> "$GITHUB_OUTPUT"
          {
            echo '### marketplace watch'
            echo ''
            echo '```json'
            cat "$RUNNER_TEMP/summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish snapshot to the watch branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP/out"
          git init -q -b watch
          git config user.name askalf
          git config user.email "263217947+askalf@users.noreply.github.com"
          # carry forward the run-per-line history from the previous snapshot
          if git fetch -q --depth 1 "https://github.com/${GITHUB_REPOSITORY}.git" watch 2>/dev/null; then
            git checkout -q FETCH_HEAD -- history.jsonl 2>/dev/null || true
          fi
          cat "$RUNNER_TEMP/summary.json" >> history.jsonl
          git add -A
          git commit -q -m "watch: $(date -u +%F) — $(cat "$RUNNER_TEMP/summary.json")"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" watch

      - name: Fail the run if anything was poisoned
        if: steps.scan.outputs.status != '0'
        run: |
          echo "::error::marketplace watch found poisoned skills — see WATCH.md on the watch branch"
          exit 1
